name: TDR metadata checks lambda build release and deploy
on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/tdr-draft-metadata-checks/**'
      - 'lambdas/tdr-draft-metadata-common/**'
      - 'build.sbt'
      - 'project/**'
  workflow_dispatch:

# Using a shared concurrency group across all workflows
concurrency:
  group: 'tdr-draft-metadata-validator-deploy'
  cancel-in-progress: false

permissions: {}

jobs:
  pre-deploy-checks:
    permissions:
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@683912c0ebb8d5d6edd15a222677395e95d12ce0 # v0.0.24
    with:
      repo-name: tdr-draft-metadata-validator
      lambda-name: draft-metadata-checks
      artifact-name: draft-metadata-checks
      artifact-path: lambdas/tdr-draft-metadata-checks/target/scala-2.13
      java-version: 21
      build-command: |
        sbt "tdrDraftMetadataChecks/assembly"
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}

  deploy-checks:
    needs: pre-deploy-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Deploy lambda
        run: |
          gh workflow run deploy-lambda.yml --ref "$REF_NAME" \
          -f environment=intg \
          -f to-deploy="$NEXT_VERSION" \
          -f lambda-name=draft-metadata-checks \
          -f deployment-package=draft-metadata-checks.jar
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REF_NAME: ${{ github.ref_name }}
          NEXT_VERSION: ${{ needs.pre-deploy-checks.outputs.next-version }}
