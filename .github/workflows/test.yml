name: TDR Run Lambda Tests
on:
  pull_request:
  push:
    branches-ignore:
      - main
      - release-*
permissions: {}
jobs:
  test:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@e3622e3bbb9019981b3aaf6b278b2fce0c7d812b # v0.0.40
    with:
      repo-name: tdr-draft-metadata-validator
      test-command: |
        sbt "scalafmtCheckAll; test"
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
