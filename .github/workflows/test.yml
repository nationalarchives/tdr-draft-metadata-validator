name: TDR Run Lambda Tests
on:
  pull_request:
  push:
    branches-ignore:
      - main
      - release-*
permissions: {}
jobs:
  test:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@683912c0ebb8d5d6edd15a222677395e95d12ce0 # v0.0.24
    with:
      repo-name: tdr-draft-metadata-validator
      test-command: |
        sbt scalafmtCheckAll test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
